<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan & Pay</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .payment-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            font-size: 15px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .qr-box {
            border: 2px dashed #bdc3c7;
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 25px;
            background-color: #fafafa;
        }

        .qr-box img {
            max-width: 220px;
            width: 100%;
            height: auto;
            display: block;
        }

        .btn-start {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .btn-start:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <h1>Scan to Pay</h1>
        <p>Please scan the QR code below to complete your payment. Once done, click "Start" to proceed.</p>
        
        <div class="qr-box">
   <img src="opppp.jpeg" alt="Payment QR Code">
        </div>

        <a href="next-page.html" class="btn-start">Start</a>
    </div>

</body>
</html>
